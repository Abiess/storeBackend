# H2 Test Configuration (PostgreSQL mode)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# SQL Initialization - schema.sql DEAKTIVIERT (Hibernate erstellt Schema)
spring.sql.init.mode=never
spring.sql.init.continue-on-error=false

# Flyway disabled
spring.flyway.enabled=false

# H2 Console disabled
spring.h2.console.enabled=false
