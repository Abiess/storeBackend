spring.application.name=storeBackend

# H2 Database Configuration (local)
# WICHTIG: 'file:' statt 'mem:' damit Daten den App-Restart überleben.
# AUTO_SERVER=TRUE erlaubt parallelen Zugriff (z.B. App + H2-Console).
spring.datasource.url=jdbc:h2:file:./data/storedb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console enable
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
# 'update' = additive Schema-Änderungen, KEIN Datenverlust beim Restart.
# NIEMALS auf 'create' / 'create-drop' setzen.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# SQL Initialization - schema.sql NICHT bei jedem Start ausführen
# (Hibernate erstellt das Schema selbst – sonst doppelte CREATE-TABLE-Fehler)
spring.sql.init.mode=never
spring.sql.init.continue-on-error=false

# Flyway - DISABLED for H2 local (only for PostgreSQL in production)
spring.flyway.enabled=false

# Actuator & Prometheus Metrics for Grafana
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.tags.application=${spring.application.name}

# HTTP Request Metrics
management.observations.http.server.requests.name=http.server.requests

# WhatsApp Cloud API (Meta / Facebook)
# Docs: https://developers.facebook.com/docs/whatsapp/cloud-api
# DEV MODE: whatsapp.enabled=false -> code is printed to log only
# NOTE: Set to false when the Meta Access Token is expired (tokens expire after 1-60 days)
# In DEV mode the code appears in the backend log (search for [WhatsApp/DEV])
whatsapp.enabled=false
whatsapp.api-version=v22.0
whatsapp.phone-number-id=1083661678159369
whatsapp.access-token=REPLACE_WITH_VALID_META_TOKEN
# Leave empty = plain text (works immediately for test numbers)
# With own template (e.g. verify_code with {{1}}): whatsapp.verification-template-name=verify_code
whatsapp.verification-template-name=
whatsapp.verification-template-lang=de

# Telegram Bot API
# DEV MODE: telegram.enabled=false -> alle Calls werden im Log simuliert (suche [Telegram/DEV])
# Jeder Store konfiguriert seinen eigenen Bot-Token in der DB (telegram_store_config)
# Bot muss als Admin im jeweiligen Channel eingetragen sein
telegram.enabled=false

# Telegram Auth Bot (für Quick-Start Phone-Verifizierung – GRATIS, kein WhatsApp nötig)
# 1. Bot via @BotFather erstellen → /newbot
# 2. Token hier eintragen oder als Env-Variable: TELEGRAM_AUTH_BOT_TOKEN
# 3. Bot-Username (ohne @): z.B. marktma_verify_bot
# 4. Webhook registrieren: GET https://api.markt.ma/api/auth/telegram-webhook/setup
telegram.auth.bot-token=${TELEGRAM_AUTH_BOT_TOKEN:}
telegram.auth.bot-username=${TELEGRAM_AUTH_BOT_USERNAME:marktma_verify_bot}

# Telegram MTProto Scraper (Python Microservice)
# Lokal: python telegram-scraper/main.py  →  http://localhost:8001
# Docker: telegram-scraper Container
telegram.scraper.url=http://localhost:8001

# Telegram Plattform App – zentrale Shared Credentials (aus my.telegram.org)
# Diese werden genutzt wenn User KEINE eigene api_id/api_hash angeben (Standard-Flow).
# api_hash NIEMALS im Frontend exponieren – nur serverseitig verwenden!
# In Production via Env-Variablen setzen: TELEGRAM_APP_API_ID / TELEGRAM_APP_API_HASH
telegram.app.api-id=${TELEGRAM_APP_API_ID:24879523}
telegram.app.api-hash=${TELEGRAM_APP_API_HASH:e765a3d73c60cfd71d72d75ed45956d0}

# Phone Verification Settings
verification.code.expiry-minutes=10
verification.max-attempts=3
verification.rate-limit-minutes=1

# Email Verification Settings
# DEVELOPMENT MODE: Skip email verification requirement for login
# Set to false in production when email is properly configured
email.verification.skip-for-login=true
email.verification.enabled=true

# Email Configuration (Mail-Server)
# IMPORTANT: These values must be configured for production
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=noreply@example.com
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=noreply@example.com

# Application Base URL (for Email-Links)
app.base-url=http://localhost:4200

# ════════════════════════════════════════════════════════════
# DHL Platform Credentials (markt.ma zentral)
# ════════════════════════════════════════════════════════════
# Diese Credentials werden von markt.ma zentral bereitgestellt.
# Normale Händler benötigen KEINEN eigenen DHL Developer Account.
# Händler bringen nur mit: DHL Geschäftskunden-Username, Passwort, Abrechnungsnummer.
#
# WICHTIG für Production:
# - Platform Credentials nur nutzen wenn platformCredentialsAllowed=true
# - Client Secret NIEMALS im Log ausgeben
# - Store-spezifische Credentials haben Vorrang vor Platform Credentials
#
# Sandbox: Nutzt weiterhin die bestehenden Sandbox Credentials (unverändert)
dhl.platform-client-id=${DHL_PLATFORM_CLIENT_ID:}
dhl.platform-client-secret=${DHL_PLATFORM_CLIENT_SECRET:}
dhl.platform-credentials-allowed=${DHL_PLATFORM_CREDENTIALS_ALLOWED:false}

# Secret Encryption (für sensible DB-Felder: Passwörter, API Secrets)
# ════════════════════════════════════════════════════════════
# Key muss 256-bit (32 Bytes) Base64-encoded sein
# Generierung: openssl rand -base64 32
# WICHTIG: Key NIEMALS verlieren! Verschlüsselte Daten können ohne Key nicht entschlüsselt werden.
# WICHTIG: Key NIEMALS in Logs ausgeben!
app.secret.encryption-key=${APP_SECRET_ENCRYPTION_KEY:}
