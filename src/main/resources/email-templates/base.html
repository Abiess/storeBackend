<!DOCTYPE html>
<html lang="{{lang}}" dir="{{dir}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f4f6f9; color: #333; }
    .wrapper { max-width: 620px; margin: 30px auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 36px 40px; text-align: center; }
    .header img.logo { max-height: 48px; margin-bottom: 12px; }
    .header h1 { color: #fff; font-size: 24px; font-weight: 700; letter-spacing: -0.3px; }
    .header .icon { font-size: 40px; margin-bottom: 8px; display: block; }
    .body { padding: 36px 40px; }
    .greeting { font-size: 16px; color: #555; margin-bottom: 20px; }
    .intro { font-size: 15px; color: #444; line-height: 1.7; margin-bottom: 28px; }
    .btn { display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff !important; text-decoration: none; padding: 14px 32px; border-radius: 8px; font-size: 15px; font-weight: 600; margin: 8px 0 24px; }
    .btn:hover { opacity: 0.9; }
    .info-box { background: #f8f9ff; border: 1px solid #e5e7f0; border-radius: 8px; padding: 20px 24px; margin: 20px 0; }
    .info-box .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .info-box .value { font-size: 16px; font-weight: 700; color: #333; }
    .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .info-row:last-child { border-bottom: none; }
    .info-row .key { color: #666; }
    .info-row .val { font-weight: 600; color: #333; }
    table.items { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
    table.items th { background: #f0f2ff; color: #667eea; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 12px; text-align: left; }
    table.items td { padding: 12px; border-bottom: 1px solid #f5f5f5; color: #444; vertical-align: top; }
    table.items tr:last-child td { border-bottom: none; }
    table.items .total-row td { font-weight: 700; background: #f8f9ff; color: #333; }
    .tracking-box { background: linear-gradient(135deg, #f0f4ff, #f8f0ff); border: 2px solid #667eea; border-radius: 10px; padding: 20px 24px; text-align: center; margin: 20px 0; }
    .tracking-box .tracking-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .tracking-box .tracking-number { font-size: 22px; font-weight: 800; color: #667eea; letter-spacing: 2px; margin: 6px 0; }
    .warning-box { background: #fff8f0; border-left: 4px solid #f59e0b; border-radius: 6px; padding: 14px 18px; margin: 20px 0; font-size: 14px; color: #92400e; }
    .success-icon { text-align: center; font-size: 56px; margin: 0 0 16px; }
    .divider { border: none; border-top: 1px solid #eee; margin: 24px 0; }
    .note { font-size: 13px; color: #888; line-height: 1.6; margin-top: 8px; }
    .footer { background: #f8f9ff; border-top: 1px solid #eee; padding: 24px 40px; text-align: center; }
    .footer p { font-size: 13px; color: #888; line-height: 1.8; }
    .footer a { color: #667eea; text-decoration: none; }
    .section-title { font-size: 13px; font-weight: 700; color: #667eea; text-transform: uppercase; letter-spacing: 0.5px; margin: 24px 0 10px; }
    /* RTL support */
    [dir="rtl"] table.items th { text-align: right; }
    [dir="rtl"] .info-row { flex-direction: row-reverse; }
    [dir="rtl"] .warning-box { border-left: none; border-right: 4px solid #f59e0b; }
    @media (max-width: 480px) {
      .body, .header, .footer { padding: 24px 20px; }
      table.items th, table.items td { padding: 8px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    {{> header}}
    <div class="body">
      {{> content}}
    </div>
    {{> footer}}
  </div>
</body>
</html>
