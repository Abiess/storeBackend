<!DOCTYPE html>
<html lang="{{lang}}" dir="{{dir}}">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{title}}</title>
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f4f6f9;color:#333; }
.wrapper { max-width:620px;margin:30px auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.08); }
.header { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:36px 40px;text-align:center; }
.header h1 { color:#fff;font-size:22px;font-weight:700; }
.header p { color:rgba(255,255,255,0.85);font-size:14px;margin-top:6px; }
.body { padding:36px 40px; }
.greeting { font-size:16px;color:#555;margin-bottom:18px; }
.intro { font-size:15px;color:#444;line-height:1.7;margin-bottom:24px; }
.btn-wrap { text-align:center;margin:24px 0; }
.btn { display:inline-block;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff!important;text-decoration:none;padding:14px 36px;border-radius:8px;font-size:15px;font-weight:600; }
.store-url-box { background:#f8f9ff;border:1.5px solid #e0e7ff;border-radius:10px;padding:16px 20px;margin:20px 0;text-align:center; }
.store-url-box .label { font-size:12px;color:#888;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px; }
.store-url-box a { font-size:16px;font-weight:700;color:#667eea;text-decoration:none;word-break:break-all; }
.store-url-box a:hover { text-decoration:underline; }
.divider { border:none;border-top:1px solid #f0f0f0;margin:24px 0; }
.tip { font-size:13px;color:#888;line-height:1.6; }
.footer { background:#f8f9ff;border-top:1px solid #eee;padding:24px 40px;text-align:center; }
.footer p { font-size:13px;color:#888;line-height:1.8; }
.footer a { color:#667eea;text-decoration:none; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>🎉 {{title}}</h1>
    <p>{{storeName}}</p>
  </div>
  <div class="body">
    <p class="greeting">{{greeting}}</p>
    <p class="intro">{{intro}}</p>

    <div class="store-url-box">
      <div class="label">Dein Store</div>
      <a href="{{storeUrl}}">{{storeUrl}}</a>
    </div>

    <div class="btn-wrap">
      <a class="btn" href="{{dashboardUrl}}">{{btnLabel}}</a>
    </div>

    <hr class="divider">
    <p class="tip">💡 <strong>Tipp:</strong> Speichere diese E-Mail. Sie enthält deinen direkten Zugang zum Store-Dashboard und zur Store-URL.</p>
  </div>
  <div class="footer">
    <p>{{footerTeam}}</p>
    <p><a href="mailto:support@markt.ma">{{footerSupport}}</a></p>
  </div>
</div>
</body>
</html>
