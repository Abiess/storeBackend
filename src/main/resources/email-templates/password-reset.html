<!DOCTYPE html>
<html lang="{{lang}}" dir="{{dir}}">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{title}}</title>
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f0f2ff;color:#1a1a2e; }
.wrapper { max-width:620px;margin:30px auto;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 8px 32px rgba(102,126,234,0.15); }
.header { background:#764ba2;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:40px 40px 36px;text-align:center; }
.header h1 { color:#ffffff;font-size:22px;font-weight:700;margin-top:10px;line-height:1.3; }
.header-logo { width:78px;height:78px;border-radius:14px;margin:0 auto 14px;display:block;background:#fff; }
.body { padding:36px 40px; }
.greeting { font-size:16px;color:#1a1a2e;font-weight:600;margin-bottom:14px; }
.intro { font-size:15px;color:#444;line-height:1.75;margin-bottom:28px; }
.btn-wrap { text-align:center;margin:28px 0 20px; }
/* Vollständig mit Inline-Fallback – !important für Outlook */
.btn {
  display:inline-block;
  background-color:#764ba2;
  background:#764ba2;
  mso-padding-alt:0;
  color:#ffffff !important;
  text-decoration:none !important;
  padding:16px 40px;
  border-radius:8px;
  font-size:16px;
  font-weight:700;
  letter-spacing:0.3px;
  border:2px solid #5a3580;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
}
.btn:visited { color:#ffffff !important; }
.url-fallback { font-size:12px;color:#888;text-align:center;margin-top:10px;word-break:break-all; }
.url-fallback a { color:#667eea;text-decoration:underline; }
.expiry { font-size:13px;color:#666;text-align:center;margin-top:18px;padding:12px 16px;background:#f8f6ff;border-radius:8px;border:1px solid #e8e0ff; }
.ignore { font-size:12px;color:#999;margin-top:20px;line-height:1.7;text-align:center; }
.divider { height:1px;background:#eee;margin:28px 0; }
.footer { background:#f8f6ff;border-top:1px solid #e8e0ff;padding:24px 40px;text-align:center; }
.footer p { font-size:13px;color:#666;line-height:2; }
.footer a { color:#667eea;text-decoration:none;font-weight:600; }
.footer a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    {{#storeLogo}}<img style="max-height:44px;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto;" src="{{storeLogo}}" alt="Markt.ma">{{/storeLogo}}
    <img src="{{logoUrl}}" alt="markt.ma" class="header-logo" style="width:78px;height:78px;border-radius:14px;margin:0 auto 14px;display:block;background:#fff;">
    <h1>{{title}}</h1>
  </div>
  <div class="body">
    <p class="greeting">{{greeting}}</p>
    <p class="intro">{{intro}}</p>

    <div class="btn-wrap">
      <!--[if mso]>
      <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" href="{{resetUrl}}" style="height:52px;v-text-anchor:middle;width:240px;" arcsize="10%" stroke="f" fillcolor="#764ba2">
        <w:anchorlock/>
        <center style="color:#ffffff;font-family:sans-serif;font-size:16px;font-weight:700;">{{btnLabel}}</center>
      </v:roundrect>
      <![endif]-->
      <!--[if !mso]><!-->
      <a class="btn" href="{{resetUrl}}" style="background-color:#764ba2;color:#ffffff;text-decoration:none;display:inline-block;padding:16px 40px;border-radius:8px;font-size:16px;font-weight:700;border:2px solid #5a3580;">
        {{btnLabel}}
      </a>
      <!--<![endif]-->
    </div>

    <p class="url-fallback">
      Link nicht klickbar? Kopiere diese URL in deinen Browser:<br>
      <a href="{{resetUrl}}">{{resetUrl}}</a>
    </p>

    <div class="divider"></div>
    <p class="expiry">⏳ {{expiry}}</p>
    <p class="ignore">{{ignore}}</p>
  </div>
  <div class="footer">
    <p><strong>{{footerTeam}}</strong></p>
    <p><a href="mailto:support@markt.ma">{{footerSupport}}</a></p>
  </div>
</div>
</body>
</html>
