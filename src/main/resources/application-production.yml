spring:
  application:
    name: storeBackend

  datasource:
    url: jdbc:postgresql://localhost:5432/storedb
    username: storeapp
    # from SPRING_DATASOURCE_PASSWORD env var or /etc/storebackend.env
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 20000
      idle-timeout: 300000
      data-source-properties:
        currentSchema: public

  jpa:
    hibernate:
      # 'update' = additive Schema-Änderungen (neue Spalten/Tabellen werden angelegt,
      # bestehende Daten bleiben erhalten). NIE 'create' oder 'create-drop' in Production!
      # Override per ENV: SPRING_JPA_HIBERNATE_DDL_AUTO=validate (z.B. nach Flyway-Einführung)
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false  # In Production: false (performance)
    open-in-view: false  # Prevents lazy-loading issues
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  sql:
    init:
      mode: never  # Disable schema.sql - Hibernate creates schema from Entities

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:markt.ma.noreply@gmail.com}
    password: ${SMTP_PASS:fefz phln uprt eikh}
    from: ${MAIL_FROM:noreply@markt.ma}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    threads:
      max: 100
      min-spare: 20

# Management & Health Check Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always  # Show details for debugging
      probes:
        enabled: true
  health:
    # ONLY PostgreSQL and DiskSpace enabled - everything else off!
    defaults:
      enabled: false  # IMPORTANT: Disable all other health checks by default
    db:
      enabled: true  # Only PostgreSQL
    diskSpace:
      enabled: true
      threshold: 10MB
    ping:
      enabled: true  # Einfacher Ping
    # Explizit alle anderen deaktivieren
    mail:
      enabled: false  # No SMTP health check (prevents 503)
    mongo:
      enabled: false  # No MongoDB
    redis:
      enabled: false  # No Redis
    cassandra:
      enabled: false
    couchbase:
      enabled: false
    elasticsearch:
      enabled: false
    influxdb:
      enabled: false
    jms:
      enabled: false
    ldap:
      enabled: false
    neo4j:
      enabled: false
    rabbit:
      enabled: false
    solr:
      enabled: false
  health.livenessState.enabled: true
  health.readinessState.enabled: true

# Logging for Production
logging:
  level:
    root: INFO
    storebackend: INFO
    # Security/JWT: WARN verhindert Log-Spam pro Request (alle INFO sind jetzt DEBUG)
    storebackend.security: WARN
    org.springframework.security: WARN  # war: INFO
    org.hibernate: INFO
    # Actuator Health: WARN statt DEBUG – kein Health-Spam alle 15s
    org.springframework.boot.actuate.health: WARN  # war: DEBUG

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true

jwt:
  secret: ${JWT_SECRET:change-me-in-production}
  expiration: 604800000  # 7 Tage (war: 86400000 = 1 Tag)

