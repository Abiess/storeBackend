  region: ${MINIO_REGION:us-east-1}

  # endpoint is http internally - secure=false

  endpoint: ${MINIO_ENDPOINT:https://minio.markt.ma}
  secure: ${MINIO_SECURE:true}

# Plattform-Default-Assets (Starter-Pack-Bilder Restaurant/Riad).
# Öffentliche MinIO-Basis (Bucket store-assets, Prefix default-assets).
markt:
  assets:
    default-base-url: ${MARKT_ASSETS_BASE_URL:https://minio.markt.ma/store-assets/default-assets}

# CJ Dropshipping API Configuration (Production)
