    base-url: ${CJ_API_BASE_URL:https://developers.cjdropshipping.com/api2.0/v1}
    timeout: ${CJ_API_TIMEOUT:30000}

# Hugging Face API Configuration for AI Product Creation
huggingface:
  api:
    key: ${HUGGINGFACE_API_KEY:}

# OpenRouter AI – OpenAI-kompatibler Unified-AI-Zugang
# Kostenlose Vision-Modelle: google/gemini-2.0-flash-exp:free
# Key-Format: sk-or-v1-...  →  https://openrouter.ai/keys
