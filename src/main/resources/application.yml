spring:
  application:
    name: storeBackend

  # H2 File-Database (local development without PostgreSQL)
  # WICHTIG: 'file:' statt 'mem:' damit Daten den App-Restart überleben.
  # AUTO_SERVER=TRUE erlaubt parallelen Zugriff (z.B. App + H2-Console).
  # Speicherort: ./data/storedb.mv.db (relativ zum Projekt-Root)
  datasource:
    url: jdbc:h2:file:./data/storedb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      # WICHTIG: 'update' damit bestehende User-Daten beim Restart erhalten bleiben.
      # NIEMALS 'create' oder 'create-drop' verwenden – das löscht alle Daten!
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  sql:
    init:
      mode: never  # Schema.sql for H2 disabled - Hibernate creates schema from Entities

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:markt.ma.noreply@gmail.com}
    password: ${SMTP_PASS:fefz phln uprt eikh}
    from: ${MAIL_FROM:noreply@markt.ma}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8080
  tomcat:
    threads:
      max: 50
      min-spare: 10

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true

jwt:
  # hardcoded locally only - in production use ENV variable (see below)
  secret: mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLongForHS256Algorithm
  expiration: 604800000  # 7 Tage (war: 86400000 = 1 Tag)

# Base URL for Verification-Links
app:
  base-url: ${APP_BASE_URL:https://markt.ma}
  subscription:
    cron:
      renewal: ${APP_SUB_CRON_RENEWAL:0 0 2 * * *}
      trial: ${APP_SUB_CRON_TRIAL:0 30 2 * * *}
      reminder: ${APP_SUB_CRON_REMINDER:0 0 9 * * *}
  cart:
    cron:
      cleanup: ${APP_CART_CRON_CLEANUP:0 15 3 * * *}
      reminder: ${APP_CART_CRON_REMINDER:0 0 10 * * *}
    reminder:
      idle-hours: ${APP_CART_REMINDER_IDLE_HOURS:24}

mail:
  enabled: ${MAIL_ENABLED:true}

# Plattform-Default-Assets (z.B. Starter-Pack-Bilder für Restaurant/Riad).
# Öffentliche MinIO-Basis – Default-Bilder sind so zentral austauschbar.
markt:
  assets:
    default-base-url: ${MARKT_ASSETS_BASE_URL:https://markt.minio.ma/store-assets/default-assets}

# Email Verification Configuration
email:
  verification:
    skip-for-login: ${EMAIL_VERIFICATION_SKIP:false}

# CAPTCHA Configuration (Bot-Schutz für Registrierung, Login, Password-Reset)
# Provider: hcaptcha (empfohlen) oder recaptcha
# hCaptcha Setup: https://www.hcaptcha.com/ (kostenlos, DSGVO-konform)
# reCAPTCHA Setup: https://www.google.com/recaptcha/admin
captcha:
  enabled: ${CAPTCHA_ENABLED:true}
  provider: ${CAPTCHA_PROVIDER:hcaptcha}
  secret: ${CAPTCHA_SECRET:}
  min-score: ${CAPTCHA_MIN_SCORE:0.5}

# MinIO disabled locally by default
minio:
  enabled: false
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: store-assets
  region: us-east-1
  secure: false

# CJ Dropshipping API Configuration
cj:
  api:
    base-url: ${CJ_API_BASE_URL:https://developers.cjdropshipping.com/api2.0/v1}
    timeout: ${CJ_API_TIMEOUT:30000}

# Hugging Face API (Legacy – wird durch OpenRouter ersetzt wenn Key gesetzt)
huggingface:
  api:
    key: ${HUGGINGFACE_API_KEY:}

# OpenRouter AI – OpenAI-kompatibler Unified-AI-Zugang (bevorzugt)
# Kostenlose Vision-Modelle: google/gemini-2.0-flash-exp:free
# Key-Format: sk-or-v1-...  →  https://openrouter.ai/keys
openrouter:
  api:
    key: ${OPENROUTER_API_KEY:}

# Unsplash API – Freie Bildvorschläge im Create-Store-Wizard (nur serverseitig!)
# Key anlegen: https://unsplash.com/developers
# NIEMALS in Angular-Frontend oder Git speichern!
unsplash:
  api:
    key: ${UNSPLASH_ACCESS_KEY:}
    base-url: https://api.unsplash.com
    results-per-page: 12

# DHL Parcel DE Shipping API (Sandbox)
# Key anlegen: https://developer.dhl.com/
# SICHERHEIT: Client Secret NIEMALS ins Git committen!
dhl:
  enabled: ${DHL_ENABLED:false}
  env: ${DHL_ENV:sandbox}
  client-id: ${DHL_CLIENT_ID:}
  client-secret: ${DHL_CLIENT_SECRET:}
  auth-url: ${DHL_AUTH_URL:https://api-sandbox.dhl.com/parcel/de/account/auth/ropc/v1/token}
  shipping-base-url: ${DHL_SHIPPING_BASE_URL:https://api-sandbox.dhl.com/parcel/de/shipping/v2}
  sandbox-username: ${DHL_SANDBOX_USERNAME:user-valid}
  sandbox-password: ${DHL_SANDBOX_PASSWORD:SandboxPasswort2023!}
  default-profile: ${DHL_DEFAULT_PROFILE:STANDARD_GRUPPENPROFIL}
  default-product: ${DHL_DEFAULT_PRODUCT:V01PAK}
  default-billing-number: ${DHL_DEFAULT_BILLING_NUMBER:33333333330102}
  timeout: ${DHL_TIMEOUT:30000}
  token-cache-duration: ${DHL_TOKEN_CACHE_DURATION:82800}
  # Default Paket-Werte (falls nicht in Order/Product angegeben)
  default-weight-grams: ${DHL_DEFAULT_WEIGHT_GRAMS:1000}
  default-length-mm: ${DHL_DEFAULT_LENGTH_MM:300}
  default-width-mm: ${DHL_DEFAULT_WIDTH_MM:200}
  default-height-mm: ${DHL_DEFAULT_HEIGHT_MM:100}
  # Sandbox Fallback Shipper Address (für Tests ohne Store-Adresse)
  sandbox-shipper-name: ${DHL_SANDBOX_SHIPPER_NAME:Test Store}
  sandbox-shipper-street: ${DHL_SANDBOX_SHIPPER_STREET:Musterstraße}
  sandbox-shipper-house-number: ${DHL_SANDBOX_SHIPPER_HOUSE_NUMBER:1}
  sandbox-shipper-postal-code: ${DHL_SANDBOX_SHIPPER_POSTAL_CODE:53113}
  sandbox-shipper-city: ${DHL_SANDBOX_SHIPPER_CITY:Bonn}
  sandbox-shipper-country: ${DHL_SANDBOX_SHIPPER_COUNTRY:DE}
