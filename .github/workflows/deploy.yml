name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      run_research_agent:
        description: 'Research Agent jetzt ausführen?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      agent_source:
        description: 'Agent-Quelle (avito / opensooq / jumia / all)'
        required: false
        default: 'avito'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ...existing code...

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # JAR lokal umbenennen → bekannter Name, kein Glob-Problem beim SCP
      - name: Rename JAR to app.jar (lokal)
        run: |
          JAR=$(ls target/storeBackend-*.jar | grep -v original | head -1)
          echo "Gefundene JAR: $JAR"
          cp "$JAR" target/app.jar
          ls -lh target/app.jar

      # Nur app.jar hochladen – kein Glob, strip_components nicht nötig
      - name: Deploy JAR to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "target/app.jar"
          target: "/tmp/"
          strip_components: 1

      # Verifikation: app.jar wirklich in /tmp vorhanden?
      - name: Verify JAR in /tmp
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "📦 Prüfe /tmp/app.jar ..."
            if [ -f /tmp/app.jar ]; then
              echo "✅ /tmp/app.jar vorhanden: $(du -h /tmp/app.jar | cut -f1)"
              ls -lh /tmp/app.jar
            else
              echo "❌ /tmp/app.jar NICHT gefunden!"
              echo "Inhalt von /tmp:"
              ls -lh /tmp/
              exit 1
            fi

      - name: Upload deployment scripts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "scripts/"
          target: "/opt/storebackend/"
          strip_components: 0

      - name: Upload Telegram Scraper
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "telegram-scraper/"
          target: "/opt/storebackend/"
          strip_components: 0

      # ── Research Agent deployen ─────────────────────────────────────
      - name: Upload Research Agent
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "research-agent/"
          target: "/opt/"
          strip_components: 0

      - name: Setup Research Agent (Node.js + npm + Cron)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          script: |
            # Node.js installieren falls nicht vorhanden
            if ! command -v node &>/dev/null; then
              echo "📦 Installiere Node.js 20 LTS..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - 2>/dev/null
              sudo apt-get install -y nodejs 2>/dev/null
            fi
            echo "✅ Node.js $(node --version) | npm $(npm --version)"

            # Verzeichnisse anlegen + npm install
            mkdir -p /opt/research-agent/output /opt/research-agent/logs
            cd /opt/research-agent
            npm install --production --silent
            echo "✅ Dependencies installiert"

            # Täglicher Cron-Job (06:00 Marokko = 05:00 UTC) – mit allen neuen Parametern
            # WICHTIG: Literalpfade verwenden (Shell-Variablen sind zur Cron-Laufzeit nicht verfügbar)
            CRON_CMD="cd /opt/research-agent"
            CRON_CMD="$CRON_CMD && /usr/bin/node main.js"
            CRON_CMD="$CRON_CMD --source all"
            CRON_CMD="$CRON_CMD --pages 3"
            CRON_CMD="$CRON_CMD --seller-type all"
            CRON_CMD="$CRON_CMD --min-score 0"
            CRON_CMD="$CRON_CMD --min-conversion 0"
            CRON_CMD="$CRON_CMD --min-saas 0"
            CRON_CMD="$CRON_CMD --min-products 0"
            CRON_CMD="$CRON_CMD --top 20"
            CRON_CMD="$CRON_CMD --output /opt/research-agent/output"
            CRON_CMD="$CRON_CMD >> /opt/research-agent/logs/cron.log 2>&1"
            MARKER="research-agent-daily"
            (crontab -l 2>/dev/null | grep -v "$MARKER" || true) > /tmp/_cron
            echo "# $MARKER" >> /tmp/_cron
            echo "0 5 * * * $CRON_CMD" >> /tmp/_cron
            crontab /tmp/_cron && rm /tmp/_cron
            echo "✅ Cron-Job aktiv: täglich 06:00 Marokko-Zeit (mit Tier-System + SaaS-Fit)"

      - name: Check Port 8001 & Setup Telegram Scraper
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "🔌 Prüfe Port 8001 (Telegram MTProto Scraper)..."
            PORT_FREE=true
            if ss -tlnp 2>/dev/null | grep -q ':8001 ' || netstat -tlnp 2>/dev/null | grep -q ':8001 '; then
              PORT_FREE=false
              echo "   ✅ Port 8001 ist bereits belegt."
              HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/health 2>/dev/null || echo "000")
              echo "   🏥 Health-Status: HTTP $HEALTH"
              if [ "$HEALTH" != "200" ]; then
                echo "   ⚠️  Scraper antwortet nicht – wird neu gestartet..."
                sudo systemctl restart telegram-scraper 2>/dev/null || true
              fi
            else
              echo "   ⚠️  Port 8001 ist frei – Telegram Scraper wird eingerichtet..."
            fi
            chmod +x /opt/storebackend/scripts/setup-telegram-scraper.sh
            bash /opt/storebackend/scripts/setup-telegram-scraper.sh

      - name: Execute deployment script
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            chmod +x /opt/storebackend/scripts/*.sh
            export SMTP_HOST="${{ secrets.SMTP_HOST }}"
            export SMTP_PORT="${{ secrets.SMTP_PORT }}"
            export SMTP_USER="${{ secrets.SMTP_USER }}"
            export SMTP_PASS="${{ secrets.SMTP_PASS }}"
            export MAIL_FROM="${{ secrets.MAIL_FROM }}"
            export APP_BASE_URL="${{ secrets.APP_BASE_URL }}"
            export MAIL_ENABLED="true"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export HUGGINGFACE_API_KEY="${{ secrets.HUGGINGFACE_API_KEY }}"
            export OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}"
            export TELEGRAM_AUTH_BOT_TOKEN="${{ secrets.TELEGRAM_AUTH_BOT_TOKEN }}"
            cd /opt/storebackend
            bash scripts/deploy.sh

      - name: Health Check
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          script: |
            set -e
            echo ""
            echo "🔌 Port 8001 (Telegram Scraper) – Statuscheck..."
            SCRAPER_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/health 2>/dev/null || echo "000")
            if [ "$SCRAPER_HEALTH" = "200" ]; then
              echo "   ✅ Telegram Scraper healthy (HTTP 200)"
            else
              echo "   ⚠️  Telegram Scraper antwortet mit HTTP $SCRAPER_HEALTH"
              echo "   🔁 Versuche Neustart..."
              sudo systemctl restart telegram-scraper 2>/dev/null || true
              sleep 5
              SCRAPER_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/health 2>/dev/null || echo "000")
              if [ "$SCRAPER_HEALTH" = "200" ]; then
                echo "   ✅ Telegram Scraper nach Neustart healthy"
              else
                echo "   ❌ Telegram Scraper nicht erreichbar (HTTP $SCRAPER_HEALTH)"
                sudo journalctl -u telegram-scraper -n 20 --no-pager || true
              fi
            fi
            echo ""
            echo "🏥 Waiting for app..."
            for i in $(seq 1 30); do
              HTTP_CODE=$(curl -fsS -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "✅ Healthy"
                curl -fsS http://localhost:8080/actuator/health
                exit 0
              fi
              echo "⏳ Attempt $i/30 (HTTP $HTTP_CODE)..."
              if [ "$HTTP_CODE" = "503" ] && [ "$i" -eq 10 ]; then
                echo "⚠️  HTTP 503 – Auto-Recovery..."
                sudo systemctl is-active --quiet postgresql || sudo systemctl start postgresql
                sudo systemctl restart storebackend
                sleep 5
              fi
              sleep 2
            done
            echo "❌ Health check failed after 30 attempts"
            sudo systemctl status storebackend --no-pager || true
            sudo journalctl -u storebackend -n 120 --no-pager || true
            exit 1

      # ── Research Agent ausführen + CSV herunterladen ────────────────
      - name: Run Research Agent (optional)
        if: github.event_name == 'schedule' || github.event.inputs.run_research_agent == 'true'
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 45m
          script: |
            SOURCE="${{ github.event.inputs.agent_source || 'avito' }}"
            OUTPUT_DIR="/opt/research-agent/output"

            echo "🧹 Bereinige alte DEMO/ERROR-CSVs..."
            find "$OUTPUT_DIR" -name "*_DEMO_*.csv" -delete 2>/dev/null || true
            find "$OUTPUT_DIR" -name "*_ERROR_*.csv" -delete 2>/dev/null || true
            find "$OUTPUT_DIR" -maxdepth 1 -name "markt-ma-leads_*.csv" -exec mv {} "$OUTPUT_DIR/archive/" \; 2>/dev/null || true

            echo "🔍 Research Agent startet – Quelle: $SOURCE"
            cd /opt/research-agent
            node main.js \
              --source "$SOURCE" \
              --pages 3 \
              --seller-type all \
              --min-score 0 \
              --min-conversion 0 \
              --min-saas 0 \
              --min-products 0 \
              --top 20 \
              --output "$OUTPUT_DIR"

            # Nur REAL-CSV kopieren
            REAL_CSV=$(ls -t "$OUTPUT_DIR"/*_REAL_*.csv 2>/dev/null | head -1)
            if [ -n "$REAL_CSV" ]; then
              cp "$REAL_CSV" /tmp/latest-leads.csv
              echo "✅ REAL-CSV bereit: $REAL_CSV ($(wc -l < /tmp/latest-leads.csv) Zeilen)"
            else
              echo "❌ Keine REAL-CSV gefunden – kein Artifact-Upload"
              exit 1
            fi

      - name: Download CSV (Research Agent Ergebnisse)
        if: github.event_name == 'schedule' || github.event.inputs.run_research_agent == 'true'
        run: |
          mkdir -p ~/.ssh leads-output
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_dl_key
          chmod 600 ~/.ssh/vps_dl_key
          scp -i ~/.ssh/vps_dl_key \
              -P "${{ secrets.VPS_PORT }}" \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/latest-leads.csv" \
              "./leads-output/latest-leads.csv"
          rm ~/.ssh/vps_dl_key
          echo "✅ CSV heruntergeladen ($(wc -l < leads-output/latest-leads.csv) Zeilen)"

      - name: Upload CSV als Artifact
        if: github.event_name == 'schedule' || github.event.inputs.run_research_agent == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: markt-ma-leads-${{ github.run_number }}
          path: leads-output/latest-leads.csv
          retention-days: 30
          if-no-files-found: warn

