name: Research Agent – Deploy & Cron

on:
  workflow_dispatch:
    inputs:
      run_now:
        description: 'Jetzt direkt einen Scraping-Lauf starten?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      source:
        description: 'Quelle (all / avito / opensooq / jumia / instagram)'
        required: false
        default: 'avito'
        type: choice
        options: ['avito', 'all', 'opensooq', 'jumia', 'instagram']
      hot_only:
        description: 'Nur HOT_LEAD-Händler (≥ 20 Produkte) scrapen + Produktbilder?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      min_saas:
        description: 'Mindest-SaaS-Fit-Score (0–100) – 0 = kein Filter'
        required: false
        default: '0'
      min_score:
        description: 'Mindest-Lead-Score (0–100) – 0 = alle anzeigen'
        required: false
        default: '0'
      min_conversion:
        description: 'Mindest-Conversion-Score (0–100) – 0 = kein Filter'
        required: false
        default: '0'
      min_products:
        description: 'Mindest-Produktanzahl pro Händler – 0 = kein Filter'
        required: false
        default: '0'
      seller_type:
        description: 'Händlertyp filtern (all / business / individual)'
        required: false
        default: 'all'
        type: choice
        options: ['all', 'business', 'individual']
      city:
        description: 'Stadt filtern (leer = alle Städte)'
        required: false
        default: ''
      category:
        description: 'Kategorie filtern (leer = alle Kategorien)'
        required: false
        default: ''
      pages:
        description: 'Anzahl Suchergebnis-Seiten pro Kategorie (1–10)'
        required: false
        default: '3'
      top:
        description: 'Top-N Händler in der Ausgabe anzeigen'
        required: false
        default: '20'

  # Täglich um 05:00 UTC (= 06:00 Marokko-Zeit) automatisch
  schedule:
    - cron: '0 5 * * *'

jobs:
  # ══════════════════════════════════════════════════════════════
  # JOB 1: Research-Agent auf VPS deployen (Dateien + npm install)
  # ══════════════════════════════════════════════════════════════
  deploy-agent:
    name: Deploy Research Agent
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Upload research-agent to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "research-agent/"
          target: "/opt/"
          strip_components: 0

      - name: Setup on VPS (Node.js + npm install + Cron)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          script: |
            set -e
            echo "════════════════════════════════════════"
            echo "  🏪 Research Agent – VPS Setup"
            echo "  Tier-System: IGNORED/BASIC/PRIORITY/HOT_LEAD"
            echo "════════════════════════════════════════"

            AGENT_DIR="/opt/research-agent"
            LOG_DIR="$AGENT_DIR/logs"

            # ── Node.js installieren falls nicht vorhanden ──────────────
            if ! command -v node &>/dev/null; then
              echo "📦 Node.js nicht gefunden – installiere v20 LTS..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - 2>/dev/null
              sudo apt-get install -y nodejs 2>/dev/null
              echo "✅ Node.js $(node --version) installiert"
            else
              echo "✅ Node.js $(node --version) bereits vorhanden"
            fi

            if ! command -v npm &>/dev/null; then
              sudo apt-get install -y npm 2>/dev/null || true
            fi
            echo "✅ npm $(npm --version)"

            mkdir -p "$AGENT_DIR/output"
            mkdir -p "$LOG_DIR"

            echo "📦 npm install..."
            cd "$AGENT_DIR"
            npm install --production --silent
            echo "✅ Dependencies installiert"

            chmod +x "$AGENT_DIR/main.js" 2>/dev/null || true

            # ── Cron-Job: täglich 06:00 Marokko-Zeit ──────────────────
            # Standard-Lauf: alle Quellen, nur IGNORED herausfiltern,
            # HOT_LEADs bekommen automatisch Produktbilder (im Scraper)
            CRON_CMD="cd $AGENT_DIR && /usr/bin/node main.js"
            CRON_CMD="$CRON_CMD --source all"
            CRON_CMD="$CRON_CMD --pages 3"
            CRON_CMD="$CRON_CMD --seller-type all"
            CRON_CMD="$CRON_CMD --min-score 0"
            CRON_CMD="$CRON_CMD --min-conversion 0"
            CRON_CMD="$CRON_CMD --min-saas 0"
            CRON_CMD="$CRON_CMD --min-products 0"
            CRON_CMD="$CRON_CMD --top 20"
            CRON_CMD="$CRON_CMD --output $AGENT_DIR/output"
            CRON_CMD="$CRON_CMD >> $LOG_DIR/cron.log 2>&1"

            CRON_JOB="0 5 * * * $CRON_CMD"
            CRON_MARKER="research-agent-daily"

            (crontab -l 2>/dev/null | grep -v "$CRON_MARKER" || true) > /tmp/crontab_new
            echo "# $CRON_MARKER" >> /tmp/crontab_new
            echo "$CRON_JOB" >> /tmp/crontab_new
            crontab /tmp/crontab_new
            rm /tmp/crontab_new

            echo "✅ Cron-Job eingerichtet: täglich 06:00 Marokko-Zeit"
            echo "   Tier-System aktiv: IGNORED <5 / BASIC 5-9 / PRIORITY 10-19 / HOT_LEAD ≥20"
            echo ""
            echo "📋 Aktuelle Crontab:"
            crontab -l

  # ══════════════════════════════════════════════════════════════
  # JOB 2: Sofort-Lauf (manuell mit run_now=true oder täglich via schedule)
  # ══════════════════════════════════════════════════════════════
  run-agent:
    name: Run Scraping Now
    runs-on: ubuntu-latest
    needs: deploy-agent
    if: github.event_name == 'schedule' || github.event.inputs.run_now == 'true'

    steps:
      - name: Run Research Agent on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 45m
          script: |
            AGENT_DIR="/opt/research-agent"

            # ── Parameter aus Workflow-Input (mit Defaults für schedule) ──
            SOURCE="${{ github.event.inputs.source || 'all' }}"
            HOT_ONLY="${{ github.event.inputs.hot_only || 'false' }}"
            MIN_SAAS="${{ github.event.inputs.min_saas || '0' }}"
            MIN_SCORE="${{ github.event.inputs.min_score || '0' }}"
            MIN_CONVERSION="${{ github.event.inputs.min_conversion || '0' }}"
            MIN_PRODUCTS="${{ github.event.inputs.min_products || '0' }}"
            SELLER_TYPE="${{ github.event.inputs.seller_type || 'all' }}"
            CITY="${{ github.event.inputs.city || '' }}"
            CATEGORY="${{ github.event.inputs.category || '' }}"
            PAGES="${{ github.event.inputs.pages || '3' }}"
            TOP="${{ github.event.inputs.top || '20' }}"

            echo "════════════════════════════════════════"
            echo "  🔍 Research Agent – Scraping Start"
            echo "  Quelle:       $SOURCE"
            echo "  Nur Hot Leads: $HOT_ONLY"
            echo "  Min SaaS-Fit: $MIN_SAAS"
            echo "  Min Score:    $MIN_SCORE"
            echo "  Min Conv.:    $MIN_CONVERSION"
            echo "  Min Produkte: $MIN_PRODUCTS"
            echo "  Händlertyp:   $SELLER_TYPE"
            echo "  Stadt:        ${CITY:-(alle)}"
            echo "  Kategorie:    ${CATEGORY:-(alle)}"
            echo "  Seiten:       $PAGES"
            echo "  Top-N:        $TOP"
            echo "  Zeitpunkt:    $(date '+%Y-%m-%d %H:%M:%S')"
            echo "  Tier-System:  IGNORED<5 / BASIC 5-9 / PRIORITY 10-19 / HOT_LEAD≥20"
            echo "════════════════════════════════════════"

            cd "$AGENT_DIR"

            # ── Befehl zusammenbauen ──────────────────────────────────
            CMD="node main.js"
            CMD="$CMD --source $SOURCE"
            CMD="$CMD --pages $PAGES"
            CMD="$CMD --seller-type $SELLER_TYPE"
            CMD="$CMD --min-score $MIN_SCORE"
            CMD="$CMD --min-conversion $MIN_CONVERSION"
            CMD="$CMD --min-saas $MIN_SAAS"
            CMD="$CMD --min-products $MIN_PRODUCTS"
            CMD="$CMD --top $TOP"
            CMD="$CMD --output $AGENT_DIR/output"

            # Optionale Flags nur anhängen wenn gesetzt
            [ "$HOT_ONLY" = "true" ]      && CMD="$CMD --hot-only"
            [ -n "$CITY" ]                && CMD="$CMD --city \"$CITY\""
            [ -n "$CATEGORY" ]            && CMD="$CMD --category \"$CATEGORY\""

            echo "▶️  Ausführen: $CMD"
            eval $CMD

            echo ""
            echo "📂 Letzte Output-Dateien:"
            ls -lht "$AGENT_DIR/output/" | head -10

            echo ""
            echo "📊 Tier-Statistik aus letztem Lauf:"
            ls -t "$AGENT_DIR/output/"*.csv 2>/dev/null | head -1 | xargs -I{} awk -F';' '
              NR==1 { for(i=1;i<=NF;i++) if($i=="tier") col=i }
              NR>1  { count[$col]++ }
              END   { for(t in count) print "  " t ": " count[t] " Händler" }
            ' {} 2>/dev/null || echo "  (CSV-Auswertung nicht verfügbar)"

      - name: Prepare CSV for download
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            LATEST=$(ls -t /opt/research-agent/output/*.csv 2>/dev/null | head -1)
            if [ -n "$LATEST" ]; then
              cp "$LATEST" /tmp/latest-leads.csv
              echo "✅ Bereit zum Download: $LATEST"
              echo "   Zeilen: $(wc -l < /tmp/latest-leads.csv)"
              # Tier-Zusammenfassung im Log
              echo "   HOT_LEAD-Händler: $(grep -c 'HOT_LEAD' /tmp/latest-leads.csv 2>/dev/null || echo 0)"
              echo "   Import-bereit:    $(grep -c 'JA' /tmp/latest-leads.csv 2>/dev/null || echo 0)"
            else
              echo "Status;Nachricht" > /tmp/latest-leads.csv
              echo "WARN;Keine Leads gefunden" >> /tmp/latest-leads.csv
              echo "⚠️  Keine CSV gefunden – leere Datei erstellt"
            fi

      - name: Download latest CSV from VPS
        run: |
          mkdir -p ~/.ssh leads-output
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_dl_key
          chmod 600 ~/.ssh/vps_dl_key
          scp -i ~/.ssh/vps_dl_key \
              -P "${{ secrets.VPS_PORT }}" \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/latest-leads.csv" \
              "./leads-output/latest-leads.csv"
          rm ~/.ssh/vps_dl_key
          echo "✅ CSV erfolgreich heruntergeladen:"
          ls -lh leads-output/latest-leads.csv

      - name: Upload CSV als GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: markt-ma-leads-${{ github.run_number }}-${{ github.run_attempt }}
          path: ./leads-output/latest-leads.csv
          retention-days: 30
          if-no-files-found: warn
