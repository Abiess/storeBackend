name: Deploy Frontend to VPS

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'storeFrontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Clean npm config (no auth, public registry)
        run: |
          echo ">>> Removing all npmrc files (global + project)"
          rm -f ~/.npmrc 2>/dev/null || true
          rm -f /etc/npmrc 2>/dev/null || true
          rm -f /usr/local/etc/npmrc 2>/dev/null || true
          rm -f .npmrc 2>/dev/null || true
          rm -f storeFrontend/.npmrc 2>/dev/null || true

      - name: Debug npm config before install
        working-directory: storeFrontend
        run: |
          echo ">>> NPM env:"
          echo "NPM_CONFIG_USERCONFIG=${NPM_CONFIG_USERCONFIG:-<not set>}"
          echo "NODE_AUTH_TOKEN=${NODE_AUTH_TOKEN:+<set but hidden>}"

          echo ">>> Existing .npmrc files:"
          find .. -name ".npmrc" -print || true

          echo ">>> Forcing public npm registry:"
          npm config set registry https://registry.npmjs.org/
          npm config list -l

      - name: Install dependencies (public registry, no auth)
        working-directory: storeFrontend
        run: npm ci --legacy-peer-deps
        env:
          npm_config_registry: https://registry.npmjs.org/

      # ── Microsoft Clarity ID injizieren ────────────────────────────
      # Ersetzt den Platzhalter in environment.prod.ts VOR dem Build.
      # Leeres/fehlendes Secret → Platzhalter wird entfernt → Clarity deaktiviert.
      - name: Inject CLARITY_ID into environment.prod.ts
        run: |
          CLARITY_VAL="${{ secrets.CLARITY_ID }}"
          sed -i "s/__CLARITY_ID__/${CLARITY_VAL}/g" storeFrontend/src/environments/environment.prod.ts
          echo "✅ Clarity ID injected: ${CLARITY_VAL:-<empty – Clarity disabled>}"
          grep clarityId storeFrontend/src/environments/environment.prod.ts

      - name: Build Angular app
        working-directory: storeFrontend
        run: npm run build:prod

      - name: Verify no unreplaced placeholders in dist
        working-directory: storeFrontend
        run: |
          if grep -r "__CLARITY_ID__" dist/markt-ma-frontend/ --include="*.js" --include="*.html" -l 2>/dev/null; then
            echo "❌ __CLARITY_ID__ Platzhalter noch im dist – sed-Schritt fehlgeschlagen!"
            exit 1
          else
            echo "✅ Kein Platzhalter im dist – Build sauber"
          fi

      - name: Create deployment package
        working-directory: storeFrontend
        run: |
          cd dist/markt-ma-frontend
          tar -czf ../../frontend-dist.tar.gz *

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "storeFrontend/frontend-dist.tar.gz"
          target: "/tmp/"
          strip_components: 1

      - name: Extract and setup on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "🚀 Deploying Frontend to markt.ma..."
            
            # Create frontend directory if not exists
            sudo mkdir -p /var/www/markt.ma
            
            # Backup old version
            if [ -d "/var/www/markt.ma/current" ]; then
              echo "📦 Backing up old version..."
              sudo mv /var/www/markt.ma/current /var/www/markt.ma/backup-$(date +%Y%m%d-%H%M%S) || true
            fi
            
            # Create new directory
            sudo mkdir -p /var/www/markt.ma/current
            
            # Extract new build
            echo "📂 Extracting new build..."
            sudo tar -xzf /tmp/frontend-dist.tar.gz -C /var/www/markt.ma/current
            
            # Set permissions
            echo "🔒 Setting permissions..."
            sudo chown -R www-data:www-data /var/www/markt.ma/current
            sudo chmod -R 755 /var/www/markt.ma/current
            
            # Cleanup
            rm /tmp/frontend-dist.tar.gz
            
            # Keep only last 3 backups
            cd /var/www/markt.ma
            sudo ls -t | grep backup | tail -n +4 | xargs -r sudo rm -rf || true
            
            echo "✅ Frontend deployment complete!"
            echo "📍 Location: /var/www/markt.ma/current"


      - name: Deployment summary
        run: |
          echo "## 🎉 Frontend Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Frontend built successfully" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Deployed to VPS" >> $GITHUB_STEP_SUMMARY
          echo "- 📍 Location: /var/www/markt.ma/current" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 Domain: http://markt.ma" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 WWW: http://www.markt.ma" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Configure DNS A-Record for markt.ma → VPS IP" >> $GITHUB_STEP_SUMMARY
          echo "2. Configure DNS A-Record for www.markt.ma → VPS IP" >> $GITHUB_STEP_SUMMARY
          echo "3. Setup SSL with: sudo certbot --nginx -d markt.ma -d www.markt.ma" >> $GITHUB_STEP_SUMMARY
