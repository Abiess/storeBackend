# =============================================================================
#  Nginx-Snippet: Iframe-Embedding für Storefront-Subdomains
#  -----------------------------------------------------------
#  ZWECK
#  Erlaubt, dass Storefront-Subdomains (z.B. testeme.markt.ma) im Theme-Editor
#  des Admin-Panels (markt.ma) per <iframe> eingebettet werden.
#
#  HINTERGRUND
#  Browser behandeln markt.ma und testeme.markt.ma als UNTERSCHIEDLICHE Origins.
#  Das alte 'X-Frame-Options: SAMEORIGIN' verbietet daher jeden Subdomain-Embed
#  und führt zur Browser-Meldung "Verbindung abgelehnt" / "X-Frame-Options".
#
#  Lösung: feingranular per CSP frame-ancestors die eigenen Subdomains zulassen.
#
#  EINBINDUNG (in /etc/nginx/sites-available/markt.ma.conf)
#  -------------------------------------------------------
#  server {
#      listen 443 ssl http2;
#      server_name *.markt.ma;
#      ...
#      include /etc/nginx/snippets/iframe-embed-policy.conf;
#      ...
#  }
#
#  Datei nach /etc/nginx/snippets/iframe-embed-policy.conf kopieren, dann:
#      sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# Alte Header EXPLIZIT entfernen, falls woanders gesetzt.
# Wichtig: 'always' damit auch bei 4xx/5xx-Responses entfernt wird.
proxy_hide_header X-Frame-Options;
add_header X-Frame-Options "" always;

# Moderne Embedding-Policy
add_header Content-Security-Policy
    "frame-ancestors 'self' https://markt.ma https://*.markt.ma"
    always;

# Optional, falls man den Editor auch lokal testen will:
# add_header Content-Security-Policy
#     "frame-ancestors 'self' https://markt.ma https://*.markt.ma http://localhost:4200"
#     always;

