<div class="preview-container">
  <!-- Toolbar -->
  <mat-toolbar color="primary" class="preview-toolbar">
    <span class="document-title">{{ data.document.originalFilename }}</span>
    <span class="toolbar-spacer"></span>
    
    <!-- PDF Controls -->
    <div *ngIf="isPdf && !loading && !error" class="pdf-controls">
      <button mat-icon-button (click)="previousPage()" [disabled]="currentPage <= 1">
        <mat-icon>chevron_left</mat-icon>
      </button>
      <span class="page-info">{{ currentPage }} / {{ totalPages }}</span>
      <button mat-icon-button (click)="nextPage()" [disabled]="currentPage >= totalPages">
        <mat-icon>chevron_right</mat-icon>
      </button>
      <span class="divider">|</span>
      <button mat-icon-button (click)="pdfZoomOut()" [disabled]="pdfZoom <= 50">
        <mat-icon>zoom_out</mat-icon>
      </button>
      <span class="zoom-level">{{ pdfZoom }}%</span>
      <button mat-icon-button (click)="pdfZoomIn()" [disabled]="pdfZoom >= 200">
        <mat-icon>zoom_in</mat-icon>
      </button>
      <button mat-icon-button (click)="pdfResetZoom()">
        <mat-icon>refresh</mat-icon>
      </button>
    </div>

    <!-- Image Controls -->
    <div *ngIf="isImage && !loading && !error" class="image-controls">
      <button mat-icon-button (click)="zoomOut()" [disabled]="imageZoom <= 0.5">
        <mat-icon>zoom_out</mat-icon>
      </button>
      <span class="zoom-level">{{ (imageZoom * 100) | number:'1.0-0' }}%</span>
      <button mat-icon-button (click)="zoomIn()" [disabled]="imageZoom >= 3">
        <mat-icon>zoom_in</mat-icon>
      </button>
      <span class="divider">|</span>
      <button mat-icon-button (click)="rotateLeft()">
        <mat-icon>rotate_left</mat-icon>
      </button>
      <button mat-icon-button (click)="rotateRight()">
        <mat-icon>rotate_right</mat-icon>
      </button>
      <button mat-icon-button (click)="resetZoom()">
        <mat-icon>refresh</mat-icon>
      </button>
    </div>

    <!-- Download & Close -->
    <span class="divider">|</span>
    <button mat-icon-button (click)="downloadOriginal()" [disabled]="loading || error"
            [matTooltip]="'SUPPLIER_INVOICES.ACTIONS.DOWNLOAD' | translate">
      <mat-icon>download</mat-icon>
    </button>
    <button mat-icon-button (click)="close()">
      <mat-icon>close</mat-icon>
    </button>
  </mat-toolbar>

  <!-- Content Area -->
  <div class="preview-content">
    <!-- Loading State -->
    <div *ngIf="loading" class="loading-state">
      <mat-spinner diameter="60"></mat-spinner>
      <p>{{ 'SUPPLIER_INVOICES.PREVIEW.LOADING' | translate }}</p>
    </div>

    <!-- Error State -->
    <div *ngIf="error" class="error-state">
      <mat-icon class="error-icon">error_outline</mat-icon>
      <h3>{{ 'SUPPLIER_INVOICES.PREVIEW.ERROR_TITLE' | translate }}</h3>
      <p>{{ errorMessage }}</p>
      <button mat-raised-button color="primary" (click)="loadDocument()">
        <mat-icon>refresh</mat-icon>
        {{ 'SUPPLIER_INVOICES.PREVIEW.RETRY' | translate }}
      </button>
    </div>

    <!-- PDF Viewer (Native Browser) -->
    <div *ngIf="isPdf && !loading && !error" class="pdf-viewer">
      <iframe 
        [src]="pdfUrl" 
        [style.width]="pdfZoom + '%'"
        [style.height]="pdfZoom + '%'"
        frameborder="0">
      </iframe>
    </div>

    <!-- Image Viewer -->
    <div *ngIf="isImage && !loading && !error" class="image-viewer">
      <div class="image-wrapper">
        <img 
          [src]="imageUrl" 
          [alt]="data.document.originalFilename"
          [style.transform]="getImageTransform()"
          class="preview-image">
      </div>
    </div>
  </div>
</div>
