<nav class="nav-bar" *ngIf="storeId$ | async as storeId" role="tablist">
  <div class="nav-scroll">
    <a
      *ngFor="let tab of visibleTabs"
      [routerLink]="tab.route(storeId)"
      class="nav-tab"
      role="tab"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: tab.exact ?? false }">

      <lucide-angular [name]="tab.icon" [size]="16" strokeWidth="1.75" aria-hidden="true" class="tab-icon"></lucide-angular>

      <span class="tab-label">{{ tab.label | translate }}</span>

      <!-- Beta Badge -->
      <span class="beta-badge" *ngIf="tab.beta">Beta</span>

      <!-- Count Badge (z.B. unbestätigte Bestellungen) -->
      <span
        class="count-badge"
        *ngIf="tab.showBadge && (unverifiedCount$ | async) as count">
        <span *ngIf="count > 0">{{ count > 99 ? '99+' : count }}</span>
      </span>

      <!-- Active indicator line -->
      <span class="active-indicator"></span>
    </a>
  </div>
</nav>
