<!-- Modern E-Commerce Storefront - Dynamic Layout Switching -->

<!-- Store nicht gefunden / Reservierter Slug -->
<app-store-not-found *ngIf="storeNotFound"></app-store-not-found>

<!-- Promo-Banner (fixed, position: top/bottom per Konfiguration) -->
<app-promo-banner *ngIf="storeId" [storeId]="storeId"></app-promo-banner>

<!-- Normaler Store-Inhalt -->
<div *ngIf="!storeNotFound" class="storefront-wrapper">
  <!-- Sticky Header mit Store-Name und Warenkorb -->
  <div class="sticky-header">
    <app-storefront-header
      [storeName]="storeName || 'Loading...'"
      [storeSlug]="storeName || ''"
      [storeLogo]="storeLogo"
      [cartItemCount]="cartItemCount"
      (cartClick)="router.navigate(['/cart'])">
    </app-storefront-header>

    <!-- Category Pills Navigation - Mobile First -->
    <div class="category-pills-wrapper" *ngIf="!loading && categories.length > 0">
      <div class="category-pills">
        <button
          class="category-pill"
          [class.active]="!selectedCategory"
          (click)="filterByCategory(null)">
          {{ 'common.all' | translate }}
        </button>
        <button
          *ngFor="let cat of categories"
          class="category-pill"
          [class.active]="selectedCategory?.id === cat.id"
          (click)="filterByCategory(cat)">
          {{ cat.name }}
        </button>
      </div>
    </div>
  </div>

  <!-- Loading Indicator -->
  <div *ngIf="loading" class="loading-container">
    <div class="spinner"></div>
    <p>{{ 'storefront.loading' | translate }}</p>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       DYNAMIC LAYOUT SWITCH – basierend auf activeGridTemplate
       Hero bleibt immer gleich. Nur Produktgrid + Filter wechseln.
       ═══════════════════════════════════════════════════════════════ -->
  <main class="storefront-main" *ngIf="!loading">

    <!-- ── HERO / SLIDER – immer sichtbar, unabhängig vom Template ── -->
    <ng-container *ngTemplateOutlet="heroSection"></ng-container>

    <!-- ── PRODUCT GRID + FILTER – Template-Switch ── -->
    <ng-container [ngSwitch]="activeGridTemplate">

      <!-- Template 1: Classic Sidebar Grid (CLASSIC_BOOTSTRAP, RESTAURANT_WARM) -->
      <app-product-grid-classic *ngSwitchCase="'CLASSIC'"
        [products]="products"
        [categories]="categories"
        [filteredProducts]="filteredProducts"
        [selectedCategory]="selectedCategory"
        [storeId]="storeId || 0"
        (filterChange)="filterByCategory($event)"
        (addToCart)="addToCart($event)"
        (quickView)="openQuickView($event)"
        (sortChange)="onSortChangeStr($event)">
      </app-product-grid-classic>

      <!-- Template 2: Fashion Editorial Grid (FASHION_EDITORIAL, BEAUTY_SOFT) -->
      <app-product-grid-fashion *ngSwitchCase="'FASHION'"
        [products]="products"
        [categories]="categories"
        [filteredProducts]="filteredProducts"
        [selectedCategory]="selectedCategory"
        [storeId]="storeId || 0"
        (filterChange)="filterByCategory($event)"
        (addToCart)="addToCart($event)"
        (quickView)="openQuickView($event)"
        (sortChange)="onSortChangeStr($event)">
      </app-product-grid-fashion>

      <!-- Template 3: Compact Market Grid (ELECTRONICS_PRO, MINIMAL_DARK) -->
      <app-product-grid-compact *ngSwitchCase="'COMPACT'"
        [products]="products"
        [categories]="categories"
        [filteredProducts]="filteredProducts"
        [selectedCategory]="selectedCategory"
        [storeId]="storeId || 0"
        (filterChange)="filterByCategory($event)"
        (addToCart)="addToCart($event)"
        (quickView)="openQuickView($event)"
        (sortChange)="onSortChangeStr($event)">
      </app-product-grid-compact>

      <!-- Template 4: Mobile Marketplace Grid (MODERN_GRID, default) -->
      <app-product-grid-marketplace *ngSwitchDefault
        [products]="products"
        [categories]="categories"
        [filteredProducts]="filteredProducts"
        [selectedCategory]="selectedCategory"
        [storeId]="storeId || 0"
        (filterChange)="filterByCategory($event)"
        (addToCart)="addToCart($event)"
        (quickView)="openQuickView($event)"
        (sortChange)="onSortChangeStr($event)">
      </app-product-grid-marketplace>

    </ng-container>

  </main>

  <!-- ═══════════════════════════════════════════════════════════════
       REUSABLE TEMPLATE BLOCKS (ng-template)
       ═══════════════════════════════════════════════════════════════ -->

  <!-- HERO SECTION -->
  <ng-template #heroSection>
    <section class="slider-section" *ngIf="sliderImages && sliderImages.length > 0">
      <app-image-slider [images]="sliderImages" [autoplay]="true" [interval]="5000"></app-image-slider>
    </section>
    <section class="hero-banner" *ngIf="!sliderImages || sliderImages.length === 0">
      <div class="hero-content">
        <h1 class="hero-title">{{ storeName }}</h1>
        <p class="hero-subtitle">{{ 'storefront.discoverProducts' | translate }}</p>
      </div>
    </section>
  </ng-template>

  <!-- Quick View Modal -->
  <app-product-quick-view
    [product]="quickViewProduct"
    [isOpen]="isQuickViewOpen"
    (close)="closeQuickView()"
    (addToCartEvent)="onQuickViewAddToCart($event)"
    (viewDetailsEvent)="onQuickViewDetails($event)">
  </app-product-quick-view>

</div><!-- End storefront-wrapper -->

<!-- Footer -->
<footer class="storefront-footer">
  <div class="footer-container">
  <p>&copy; 2026 {{ storeName || 'Store' }} · {{ 'common.poweredBy' | translate }}</p>
  </div>
</footer>
