<aside
        class="admin-sidebar"
        [class.sidebar-open]="isOpen"
        [class.sidebar-mobile]="isMobile"
        [attr.dir]="isRTL() ? 'rtl' : 'ltr'"
        role="navigation"
        [attr.aria-label]="'sidebarAdmin.aria.mainNavigation' | translate"
>
    <div
            *ngIf="isMobile && isOpen"
            class="sidebar-overlay"
            (click)="closeSidebar()"
            aria-hidden="true"
    ></div>

    <div class="sidebar-content">
        <div class="sidebar-header">
            <a routerLink="/dashboard" class="sidebar-logo">
                <span class="logo-icon">🛍️</span>
                <span class="logo-text">markt.ma</span>
            </a>

            <!-- Vorschau-Button: erscheint wenn ein Store aktiv ist -->
            <button
                    *ngIf="currentStoreId"
                    class="btn-preview-store"
                    (click)="openStorePreview()"
                    title="Store live ansehen">
                <span class="btn-preview-store__dot"></span>
                <span class="btn-preview-store__label">LIVE</span>
                <span class="btn-preview-store__icon">↗</span>
            </button>

            <button
                    *ngIf="isMobile"
                    class="btn-close-sidebar"
                    (click)="closeSidebar()"
                    [attr.aria-label]="'sidebarAdmin.aria.closeNavigation' | translate"
            >
                ✕
            </button>
        </div>

        <!-- Kein Store – Hinweisbanner -->
        <div class="no-store-banner" *ngIf="!hasStore" (click)="onNoStoreClick()">
            <span class="no-store-banner__icon">🏪</span>
            <div class="no-store-banner__text">
                <strong>{{ 'sidebarAdmin.noStore.hint' | translate }}</strong>
                <span>{{ 'sidebarAdmin.noStore.cta' | translate }} →</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div *ngFor="let group of visibleGroups" class="nav-group">
                <div class="nav-group-title" *ngIf="group.titleKey">
                    {{ group.titleKey | translate }}
                </div>

                <div class="nav-items">
                    <!-- Normaler Link (hat Store oder benötigt keinen) -->
                    <a
                            *ngFor="let item of visibleItems(group)"
                            [class.nav-item-active]="isRouteActive(item.route)"
                            [class.nav-item-disabled]="item.requiresStore && !hasStore"
                            class="nav-item"
                            [attr.aria-label]="item.labelKey | translate"
                            [attr.aria-current]="isRouteActive(item.route) ? 'page' : null"
                            [attr.title]="(item.requiresStore && !hasStore) ? ('sidebarAdmin.noStore.tooltip' | translate) : null"
                            [routerLink]="(item.requiresStore && !hasStore) ? null : item.route"
                            (click)="(item.requiresStore && !hasStore) ? onNoStoreClick() : closeSidebar()"
                    >
                        <span class="nav-icon" aria-hidden="true">{{ item.icon }}</span>
                        <span class="nav-label">{{ item.labelKey | translate }}</span>
                        <span
                                *ngIf="item.badge"
                                [class]="'nav-badge ' + (item.badgeClass || 'badge-primary')"
                        >
              {{ item.badge }}
            </span>
                        <!-- Lock-Icon wenn Store fehlt -->
                        <span *ngIf="item.requiresStore && !hasStore" class="nav-item-lock" aria-hidden="true">🔒</span>
                    </a>
                </div>
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="footer-info">
                <small>© 2026 markt.ma</small>
            </div>
        </div>
    </div>
</aside>

<button
        *ngIf="isMobile && !isOpen"
        class="btn-toggle-sidebar"
        (click)="toggleSidebar()"
        [attr.aria-label]="'sidebarAdmin.aria.openNavigation' | translate"
        aria-expanded="false"
>
  <span class="hamburger-icon">
    <span></span>
    <span></span>
    <span></span>
  </span>
</button>
