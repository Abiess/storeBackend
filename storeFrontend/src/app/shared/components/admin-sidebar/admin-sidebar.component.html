<aside
        class="admin-sidebar"
        [class.sidebar-open]="isOpen"
        [class.sidebar-mobile]="isMobile"
        [class.sidebar-collapsed]="isCollapsed"
        [attr.dir]="isRTL() ? 'rtl' : 'ltr'"
        role="navigation"
        [attr.aria-label]="'sidebarAdmin.aria.mainNavigation' | translate"
>
    <div *ngIf="isMobile && isOpen" class="sidebar-overlay" (click)="closeSidebar()" aria-hidden="true"></div>

    <div class="sidebar-content">
        <!-- Header -->
        <div class="sidebar-header">
            <a routerLink="/dashboard" class="sidebar-logo">
                <img src="assets/images/logo.svg" alt="markt.ma" class="logo-icon-img">
                <span class="logo-text" *ngIf="!isCollapsed">markt.ma</span>
            </a>

            <button *ngIf="currentStoreId && !isCollapsed" class="btn-preview-store"
                    (click)="openStorePreview()" title="Store live ansehen">
                <span class="btn-preview-store__dot"></span>
                <span class="btn-preview-store__label">LIVE</span>
                <lucide-angular name="arrow-up-right" [size]="12" class="btn-preview-store__icon"></lucide-angular>
            </button>

            <button *ngIf="isMobile" class="btn-close-sidebar" (click)="closeSidebar()"
                    [attr.aria-label]="'sidebarAdmin.aria.closeNavigation' | translate">
                <lucide-angular name="x" [size]="18" strokeWidth="2"></lucide-angular>
            </button>
        </div>

        <!-- Kein Store Banner -->
        <div class="no-store-banner" *ngIf="!hasStore && !isCollapsed" (click)="onNoStoreClick()">
            <lucide-angular name="store" [size]="18" class="no-store-banner__icon" strokeWidth="1.75"></lucide-angular>
            <div class="no-store-banner__text">
                <strong>{{ 'sidebarAdmin.noStore.hint' | translate }}</strong>
                <span>{{ 'sidebarAdmin.noStore.cta' | translate }} →</span>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="sidebar-nav">
            <div *ngFor="let group of visibleGroups" class="nav-group">
                <div class="nav-group-title" *ngIf="group.titleKey && !isCollapsed">
                    {{ group.titleKey | translate }}
                </div>
                <div class="nav-group-divider" *ngIf="group.titleKey && isCollapsed"></div>

                <div class="nav-items">
                    <a
                            *ngFor="let item of visibleItems(group)"
                            [class.nav-item-active]="isRouteActive(item.route)"
                            [class.nav-item-disabled]="item.requiresStore && !hasStore"
                            class="nav-item"
                            [attr.aria-label]="item.labelKey | translate"
                            [attr.aria-current]="isRouteActive(item.route) ? 'page' : null"
                            [attr.title]="isCollapsed ? (item.labelKey | translate) : ((item.requiresStore && !hasStore) ? ('sidebarAdmin.noStore.tooltip' | translate) : null)"
                            [routerLink]="(item.requiresStore && !hasStore) ? null : item.route"
                            (click)="(item.requiresStore && !hasStore) ? onNoStoreClick() : closeSidebar()"
                    >
                        <span class="nav-icon">
                            <lucide-angular [name]="item.icon" [size]="17" strokeWidth="1.75"></lucide-angular>
                        </span>
                        <span class="nav-label" *ngIf="!isCollapsed">{{ item.labelKey | translate }}</span>
                        <span *ngIf="item.badge && !isCollapsed" [class]="'nav-badge ' + (item.badgeClass || 'badge-primary')">
                            {{ item.badge }}
                        </span>
                        <lucide-angular *ngIf="item.requiresStore && !hasStore && !isCollapsed"
                                        name="lock" [size]="13" class="nav-item-lock" strokeWidth="2">
                        </lucide-angular>
                    </a>
                </div>
            </div>
        </nav>

        <!-- Pro Plan Upgrade Card -->
        <div class="sidebar-upgrade-card" *ngIf="!isCollapsed">
            <div class="upgrade-card-inner">
                <div class="upgrade-card-header">
                    <lucide-angular name="gem" [size]="22" class="upgrade-icon" strokeWidth="1.5"></lucide-angular>
                    <div>
                        <div class="upgrade-title">Pro Plan</div>
                        <div class="upgrade-sub">Mehr Funktionen freischalten</div>
                    </div>
                </div>
                <button class="upgrade-btn" routerLink="/subscription">
                    Upgrade jetzt
                    <lucide-angular name="chevron-right" [size]="16" strokeWidth="2"></lucide-angular>
                </button>
            </div>
        </div>

        <!-- Footer -->
        <div class="sidebar-footer">
            <button class="btn-collapse" (click)="toggleCollapse()"
                    [title]="isCollapsed ? ('sidebarAdmin.expand' | translate) : ('sidebarAdmin.collapse' | translate)">
                <span class="btn-collapse__icon" [class.rotated]="isCollapsed">
                    <lucide-angular name="chevron-left" [size]="16" strokeWidth="2"></lucide-angular>
                </span>
                <span class="btn-collapse__label" *ngIf="!isCollapsed">{{ 'sidebarAdmin.collapse' | translate }}</span>
            </button>
            <div class="footer-info" *ngIf="!isCollapsed">
                <small>© 2026 markt.ma</small>
            </div>
        </div>
    </div>
</aside>

<button *ngIf="isMobile && !isOpen" class="btn-toggle-sidebar" (click)="toggleSidebar()"
        [attr.aria-label]="'sidebarAdmin.aria.openNavigation' | translate" aria-expanded="false">
    <span class="hamburger-icon">
        <span></span><span></span><span></span>
    </span>
</button>
